<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>我的行事曆</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="行事曆">
<meta name="theme-color" content="#f0a500">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e;
    --accent: #f0a500; --text: #eeeef2; --text-muted: #7a7a8e;
    --border: #2e2e3e; --success: #3ecf8e; --danger: #e05a2b; --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; max-width: 480px; margin: 0 auto; padding-bottom: 110px; font-size: 17px; }
  .header { background: linear-gradient(135deg,#1a1a22,#12121a); padding: 24px 20px 20px; border-bottom: 1px solid var(--border); position: sticky; top:0; z-index:100; }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .app-title { font-size:13px; font-family:'DM Mono',monospace; color:var(--accent); letter-spacing:2px; text-transform:uppercase; }
  .today-badge { font-family:'DM Mono',monospace; font-size:14px; background:var(--surface2); color:var(--text-muted); padding:6px 14px; border-radius:20px; border:1px solid var(--border); }
  .week-strip { display:flex; gap:6px; margin-top:14px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
  .week-strip::-webkit-scrollbar { display:none; }
  .day-chip { flex-shrink:0; display:flex; flex-direction:column; align-items:center; padding:9px 10px; border-radius:12px; cursor:pointer; transition:all 0.2s; min-width:56px; border:1px solid transparent; background:var(--surface2); }
  .day-chip:hover { border-color:var(--accent); }
  .day-chip.active { background:var(--accent); color:#000; }
  .day-chip.has-events::after { content:''; display:block; width:5px; height:5px; border-radius:50%; background:var(--danger); margin-top:4px; }
  .day-chip.active.has-events::after { background:#000; }
  .day-label { font-size:12px; color:var(--text-muted); font-family:'DM Mono',monospace; }
  .day-chip.active .day-label { color:#000; }
  .day-month { font-size:12px; color:#fff; opacity:0.7; font-family:'DM Mono',monospace; line-height:1.4; }
  .day-chip.active .day-month { color:#000; opacity:0.7; }
  .day-num { font-size:20px; font-weight:700; margin-top:1px; }
  .content { padding:20px 16px; }
  .section-title { font-size:13px; font-family:'DM Mono',monospace; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .stats-bar { display:flex; gap:10px; margin-bottom:20px; }
  .stat-card { flex:1; background:var(--surface); border-radius:12px; padding:14px; border:1px solid var(--border); text-align:center; }
  .stat-num { font-size:28px; font-weight:700; font-family:'DM Mono',monospace; color:var(--accent); }
  .stat-label { font-size:14px; color:var(--text-muted); margin-top:4px; }
  .add-form { background:var(--surface); border-radius:var(--radius); padding:16px; margin-bottom:24px; border:1px solid var(--border); }
  .form-row { display:flex; gap:8px; margin-bottom:10px; }
  .form-row:last-child { margin-bottom:0; }
  input,select,textarea { background:var(--surface2); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:13px 14px; font-family:'Noto Sans TC',sans-serif; font-size:16px; outline:none; transition:border-color 0.2s; width:100%; }
  input:focus,select:focus,textarea:focus { border-color:var(--accent); }
  input::placeholder,textarea::placeholder { color:var(--text-muted); }
  select option { background:var(--surface2); }
  textarea { resize:none; height:72px; }
  .btn-add { width:100%; padding:15px; background:var(--accent); color:#000; border:none; border-radius:10px; font-size:18px; font-weight:700; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; }
  .btn-add:hover { background:#ffc130; }
  .task-list { display:flex; flex-direction:column; gap:12px; }
  .task-card { background:var(--surface); border-radius:var(--radius); padding:16px; border:1px solid var(--border); display:flex; align-items:flex-start; gap:14px; animation:slideIn 0.3s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
  .task-card.done { opacity:0.5; }
  .task-card.done .task-title { text-decoration:line-through; color:var(--text-muted); }
  .task-check { width:28px; height:28px; border-radius:50%; border:2px solid var(--border); cursor:pointer; flex-shrink:0; margin-top:2px; transition:all 0.2s; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .task-check:hover { border-color:var(--success); }
  .task-card.done .task-check { background:var(--success); border-color:var(--success); color:#000; }
  .task-body { flex:1; min-width:0; }
  .task-title { font-size:18px; font-weight:500; margin-bottom:6px; line-height:1.4; }
  .task-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .task-time { font-family:'DM Mono',monospace; font-size:15px; color:var(--accent); }
  .task-note { font-size:15px; color:var(--text-muted); margin-top:6px; line-height:1.5; }
  .priority-label { font-size:13px; font-family:'DM Mono',monospace; padding:3px 10px; border-radius:6px; }
  .p-high-label { background:rgba(224,90,43,0.15); color:#e05a2b; }
  .p-mid-label { background:rgba(240,165,0,0.15); color:#f0a500; }
  .p-low-label { background:rgba(62,207,142,0.15); color:#3ecf8e; }
  .btn-delete { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:20px; padding:2px 6px; border-radius:6px; transition:all 0.15s; flex-shrink:0; }
  .btn-delete:hover { color:var(--danger); }
  .btn-reminder { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:20px; padding:2px 6px; border-radius:6px; transition:all 0.15s; flex-shrink:0; }
  .btn-reminder:hover { color:var(--accent); }
  .email-section { background:var(--surface); border-radius:var(--radius); padding:16px; border:1px solid var(--border); margin-top:24px; }
  .email-header { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .email-icon { width:42px; height:42px; border-radius:10px; background:rgba(240,165,0,0.15); display:flex; align-items:center; justify-content:center; font-size:22px; }
  .email-title { font-size:17px; font-weight:600; }
  .email-subtitle { font-size:14px; color:var(--text-muted); margin-top:2px; }
  .btn-email { width:100%; padding:14px; background:transparent; color:var(--accent); border:1.5px solid var(--accent); border-radius:10px; font-size:17px; font-weight:600; cursor:pointer; font-family:'Noto Sans TC',sans-serif; transition:all 0.2s; margin-top:10px; }
  .btn-email:hover { background:rgba(240,165,0,0.1); }
  .empty-state { text-align:center; padding:40px 20px; color:var(--text-muted); }
  .empty-icon { font-size:48px; margin-bottom:14px; }
  .empty-text { font-size:17px; line-height:1.7; }
  .bottom-nav { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:rgba(15,15,19,0.95); backdrop-filter:blur(12px); border-top:1px solid var(--border); padding:10px 20px 24px; display:flex; justify-content:space-around; }
  .nav-btn { display:flex; flex-direction:column; align-items:center; gap:4px; background:none; border:none; color:var(--text-muted); cursor:pointer; padding:6px 16px; border-radius:10px; transition:all 0.2s; font-family:'Noto Sans TC',sans-serif; }
  .nav-btn.active { color:var(--accent); }
  .nav-btn span { font-size:24px; }
  .nav-btn small { font-size:14px; }
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px); background:var(--success); color:#000; padding:12px 24px; border-radius:30px; font-size:16px; font-weight:600; z-index:999; transition:transform 0.3s ease; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div class="header">
  <div class="header-top">
    <div class="app-title">MY CALENDAR</div>
    <div class="today-badge" id="todayBadge">--</div>
  </div>
  <div id="currentDateDisplay" onclick="goToToday()" style="font-size:30px;font-weight:700;line-height:1.1;margin-bottom:4px;cursor:pointer;user-select:none;" title="點我回到今天">載入中...</div>
  <div class="week-strip" id="weekStrip"></div>
</div>
<div class="content">
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-num" id="totalCount">0</div><div class="stat-label">今日事項</div></div>
    <div class="stat-card"><div class="stat-num" id="doneCount">0</div><div class="stat-label">已完成</div></div>
    <div class="stat-card"><div class="stat-num" id="pendingCount">0</div><div class="stat-label">待辦中</div></div>
  </div>
  <div class="section-title">快速新增</div>
  <div class="add-form">
    <div class="form-row"><input type="text" id="taskTitle" placeholder="📝 輸入事項標題..." /></div>
    <div class="form-row">
      <input type="time" id="taskTime" style="flex:1" />
      <select id="taskPriority" style="flex:1">
        <option value="high">🔴 高優先</option>
        <option value="mid" selected>🟡 中優先</option>
        <option value="low">🟢 低優先</option>
      </select>
    </div>
    <div class="form-row"><textarea id="taskNote" placeholder="備註（選填）..."></textarea></div>
    <button class="btn-add" onclick="addTask()">＋ 新增事項</button>
  </div>
  <div class="section-title" id="taskDateLabel">今日事項</div>
  <div class="task-list" id="taskList"></div>
  <div class="email-section">
    <div class="email-header">
      <div class="email-icon">✉️</div>
      <div><div class="email-title">Email 提醒</div><div class="email-subtitle">將今日事項寄送到您的信箱</div></div>
    </div>
    <div class="form-row"><input type="email" id="emailInput" placeholder="輸入您的 Email..." /></div>
    <button class="btn-email" onclick="sendEmailReminder()">📧 發送今日提醒</button>
  </div>
</div>
<div class="bottom-nav">
  <button class="nav-btn active" onclick="switchView('today')"><span>📅</span><small>今日</small></button>
  <button class="nav-btn" onclick="switchView('all')"><span>📋</span><small>全部</small></button>
  <button class="nav-btn" onclick="switchView('done')"><span>✅</span><small>已完成</small></button>
</div>
<script>
  let tasks=JSON.parse(localStorage.getItem('calendarTasks')||'[]');
  let selectedDate=getTodayStr(),currentView='today';
  const DAYS_ZH=['日','一','二','三','四','五','六'];
  const MONTHS_ZH=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  function getTodayStr(){return new Date().toISOString().split('T')[0];}
  function formatDateDisplay(d){const dt=new Date(d+'T00:00:00');return `${dt.getFullYear()}/${MONTHS_ZH[dt.getMonth()]}${dt.getDate()}日`;}
  function init(){
    const today=new Date();
    document.getElementById('todayBadge').textContent=`星期${DAYS_ZH[today.getDay()]}`;
    document.getElementById('currentDateDisplay').innerHTML=`${today.getFullYear()} / <span style="color:var(--accent)">${MONTHS_ZH[today.getMonth()]} ${today.getDate()}日</span>`;
    renderWeekStrip();renderTasks();updateStats();
    setInterval(checkReminders,60000);checkReminders();
  }
  function renderWeekStrip(){
    const strip=document.getElementById('weekStrip');strip.innerHTML='';
    const today=new Date();
    for(let i=-30;i<=60;i++){
      const d=new Date(today);d.setDate(today.getDate()+i);
      const ds=d.toISOString().split('T')[0];
      const hasEvents=tasks.some(t=>t.date===ds);
      const chip=document.createElement('div');
      chip.className=`day-chip${ds===selectedDate?' active':''}${hasEvents?' has-events':''}`;
      chip.innerHTML=`<div class="day-label">${DAYS_ZH[d.getDay()]}</div><div class="day-month">${MONTHS_ZH[d.getMonth()]}</div><div class="day-num">${d.getDate()}</div>`;
      chip.onclick=()=>selectDate(ds);
      strip.appendChild(chip);
    }
    setTimeout(()=>{const a=strip.querySelector('.active');if(a)a.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});},100);
  }
  function selectDate(ds){
    selectedDate=ds;currentView='today';
    document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
    document.getElementById('taskDateLabel').textContent=ds===getTodayStr()?'今日事項':`${formatDateDisplay(ds)} 事項`;
    renderWeekStrip();renderTasks();updateStats();
  }
  function addTask(){
    const title=document.getElementById('taskTitle').value.trim();
    if(!title){showToast('⚠️ 請輸入事項標題');return;}
    tasks.unshift({id:Date.now(),title,time:document.getElementById('taskTime').value,priority:document.getElementById('taskPriority').value,note:document.getElementById('taskNote').value.trim(),date:selectedDate,done:false,created:new Date().toISOString()});
    saveTasks();
    document.getElementById('taskTitle').value='';
    document.getElementById('taskTime').value='';
    document.getElementById('taskNote').value='';
    document.getElementById('taskPriority').value='mid';
    renderWeekStrip();renderTasks();updateStats();showToast('✅ 事項已新增！');scheduleNotifications();
  }
  function toggleDone(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;saveTasks();renderTasks();updateStats();if(t.done)showToast('🎉 完成！繼續加油');}}
  function deleteTask(id){tasks=tasks.filter(t=>t.id!==id);saveTasks();renderWeekStrip();renderTasks();updateStats();showToast('🗑️ 已刪除');}
  function getFilteredTasks(){
    if(currentView==='all')return[...tasks].sort((a,b)=>new Date(b.created)-new Date(a.created));
    if(currentView==='done')return tasks.filter(t=>t.done).sort((a,b)=>new Date(b.created)-new Date(a.created));
    return tasks.filter(t=>t.date===selectedDate).sort((a,b)=>{if(a.time&&b.time)return a.time.localeCompare(b.time);if(a.time)return -1;if(b.time)return 1;return 0;});
  }
  function renderTasks(){
    const list=document.getElementById('taskList');
    const filtered=getFilteredTasks();
    if(!filtered.length){list.innerHTML=`<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">${currentView==='done'?'尚無已完成事項':'這天還沒有任何事項<br>點上方新增吧！'}</div></div>`;return;}
    list.innerHTML=filtered.map(t=>{
      const pc=t.priority==='high'?'high':t.priority==='mid'?'mid':'low';
      const pl=t.priority==='high'?'高':t.priority==='mid'?'中':'低';
      return `<div class="task-card${t.done?' done':''}">
        <div class="task-check" onclick="toggleDone(${t.id})">${t.done?'✓':''}</div>
        <div class="task-body">
          <div class="task-title">${t.title}</div>
          <div class="task-meta">
            ${t.time?`<div class="task-time">⏰ ${t.time}</div>`:''}
            <span class="priority-label p-${pc}-label">${pl}優先</span>
            ${currentView!=='today'?`<span style="font-size:14px;color:var(--text-muted)">${formatDateDisplay(t.date)}</span>`:''}
          </div>
          ${t.note?`<div class="task-note">${t.note}</div>`:''}
        </div>
        <button class="btn-reminder" onclick="addToReminders(${t.id})" title="加入iPhone提醒">📲</button>
        <button class="btn-delete" onclick="deleteTask(${t.id})">✕</button>
      </div>`;
    }).join('');
  }
  function updateStats(){
    const today=tasks.filter(t=>t.date===selectedDate);
    const done=today.filter(t=>t.done).length;
    document.getElementById('totalCount').textContent=today.length;
    document.getElementById('doneCount').textContent=done;
    document.getElementById('pendingCount').textContent=today.length-done;
  }
  function switchView(view){
    currentView=view;
    document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['today','all','done'][i]===view));
    document.getElementById('taskDateLabel').textContent={today:'今日事項',all:'全部事項',done:'已完成事項'}[view];
    renderTasks();
  }
  function checkReminders(){
    const now=new Date();
    const hhmm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    tasks.filter(t=>t.date===getTodayStr()&&t.time===hhmm&&!t.done&&!t.reminded).forEach(t=>{
      t.reminded=true;saveTasks();
      if(Notification.permission==='granted')new Notification(`⏰ ${t.time} 提醒`,{body:t.title});
      showToast(`⏰ 現在 ${t.time}：${t.title}`);
    });
  }
  function sendEmailReminder(){
    const email=document.getElementById('emailInput').value.trim();
    if(!email||!email.includes('@')){showToast('⚠️ 請輸入有效的 Email');return;}
    const todayTasks=tasks.filter(t=>t.date===selectedDate);
    if(!todayTasks.length){showToast('📭 今天沒有任何事項可寄送');return;}
    const lines=todayTasks.map(t=>{
      const s=t.done?'✅':'⬜';
      const p=t.priority==='high'?'🔴':t.priority==='mid'?'🟡':'🟢';
      return `${s} ${p} ${t.time?`[${t.time}] `:''}${t.title}${t.note?` — ${t.note}`:''}`;
    }).join('\n');
    const subject=encodeURIComponent(`📅 ${formatDateDisplay(selectedDate)} 行事曆提醒`);
    const body=encodeURIComponent(`您好！\n\n以下是 ${formatDateDisplay(selectedDate)} 的待辦事項：\n\n${lines}\n\n共 ${todayTasks.length} 項，已完成 ${todayTasks.filter(t=>t.done).length} 項。\n\n祝您一切順利！`);
    window.location.href=`mailto:${email}?subject=${subject}&body=${body}`;
    showToast('📧 正在開啟郵件應用...');
  }
  function saveTasks(){localStorage.setItem('calendarTasks',JSON.stringify(tasks));}
  function addToReminders(id){
    const t=tasks.find(t=>t.id===id);
    if(!t) return;
    const dateStr=t.date.replace(/-/g,'');
    const timeStr=t.time?t.time.replace(':','')+'00':'090000';
    const dtStart=dateStr+'T'+timeStr;
    const ics=[
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//MyCalendar//TW',
      'BEGIN:VEVENT',
      'SUMMARY:'+t.title,
      'DESCRIPTION:'+(t.note||''),
      'DTSTART:'+dtStart,
      'DTEND:'+dtStart,
      'BEGIN:VALARM',
      'TRIGGER:PT0S',
      'ACTION:DISPLAY',
      'DESCRIPTION:提醒：'+t.title,
      'END:VALARM',
      'END:VEVENT',
      'END:VCALENDAR'
    ].join('\r\n');
    const blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=t.title+'.ics'; a.click();
    URL.revokeObjectURL(url);
    showToast('⏰ 請用檔案App開啟，加入行事曆！');
  }
  function goToToday(){
    const today=getTodayStr();
    if(selectedDate===today){showToast('📅 已經是今天了！');return;}
    selectDate(today);
    showToast('📅 已跳回今天');
  }
  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
  document.getElementById('taskTitle').addEventListener('keydown',e=>{if(e.key==='Enter')addTask();});
  init();
</script>
</body>
</html>
